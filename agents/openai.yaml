interface:
  display_name: "Agent Dispatch Harness"
  short_description: "先判断 Direct/Lite/Full，并在需要时用 trace 检证多 Agent 调度"
  default_prompt: "Use $agent-dispatch-harness to first choose Direct, Lite, or Full mode. Work directly for small tasks, coordinate lightly for medium tasks, and dispatch only when independent work or evidence risk makes it worthwhile. For simple Codex sub-agents, prefer gpt-5.6-luna at low reasoning when the runtime exposes model overrides; keep nesting shallow, reports compact, and manager-owned acceptance. Load TDD, review, worktree, or other supporting methods only when their risk trigger applies."
